  <script type="text/javascript">
    (function(global) {
      document.addEventListener("DOMContentLoaded", evt => {
        const el = document.querySelector("div.content");
        
        async function checkNetworkAndReload() {
          try {
            const res = await fetch(".", { method: "HEAD" });
            
            if (res.status > 199 && res.status < 500) return global.location.reload(true);
          } catch (err) {
            /* Unable to connect to the server, ignore… */
            if (global.navigator.onLine) {
              document.title = "Something went wrong!";
              el.innerHTML = `
              <img class="icon" src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI4MCIgaGVpZ2h0PSI4MCIgZmlsbD0iIzcyMiIgY2xhc3M9ImJpIGJpLWV4Y2xhbWF0aW9uLWNpcmNsZSIgdmlld0JveD0iMCAwIDE2IDE2Ij4KICAgICAgICA8cGF0aCBkPSJNOCAxNUE3IDcgMCAxIDEgOCAxYTcgNyAwIDAgMSAwIDE0bTAgMUE4IDggMCAxIDAgOCAwYTggOCAwIDAgMCAwIDE2IiAvPgogICAgICAgIDxwYXRoIGQ9Ik03LjAwMiAxMWExIDEgMCAxIDEgMiAwIDEgMSAwIDAgMS0yIDBNNy4xIDQuOTk1YS45MDUuOTA1IDAgMSAxIDEuOCAwbC0uMzUgMy41MDdhLjU1Mi41NTIgMCAwIDEtMS4xIDB6IiAvPgogICAgICA8L3N2Zz4=" alt="Warning" />

              <p class="summary"><small>The server is not responding.</small></p>`;
            }
          }
          
          global.setTimeout(checkNetworkAndReload, 2500);
        }
        
        checkNetworkAndReload();
      });
    })(this)
